  <script>
    const EXCLUDED_NAMES = new Set(["?대쾾吏?, "?댁꽑??, "?ㅻ끃洹?]);
    const OFF_MARKERS = new Set(["??, "?댁썡", "諛섏감", "?곗감", "?덈퉬援?]);
    const SUMMARY_STOP_MARKERS = ["?대Т?몄썝", "異쒓렐?몄썝", "?뱀쭅?몄썝"];

    const form = document.getElementById("generatorForm");
    const filesInput = document.getElementById("files");
    const filesInfo = document.getElementById("filesInfo");
    const runBtn = document.getElementById("runBtn");
    const statusEl = document.getElementById("status");
    const downloadBtn = document.getElementById("downloadBtn");

    let outputBlob = null;
    let outputName = "";
    let downloadUrl = null;

    function setStatus(text, cls = "") {
      statusEl.textContent = text;
      statusEl.className = "status" + (cls ? " " + cls : "");
    }

    function toText(v) {
      if (v == null) return "";
      if (typeof v === "object") {
        if (Array.isArray(v.richText)) return v.richText.map((x) => x.text || "").join("");
        if (v.text != null) return String(v.text);
        if (v.result != null) return String(v.result);
      }
      return String(v).trim();
    }

    function getFormula(cell) {
      const v = cell.value;
      if (!v || typeof v !== "object") return "";
      return v.formula ? String(v.formula) : "";
    }

    function colToNumber(colLetters) {
      let n = 0;
      for (const ch of colLetters.toUpperCase()) {
        n = n * 26 + (ch.charCodeAt(0) - 64);
      }
      return n;
    }

    function colToLetters(num) {
      let n = num;
      let out = "";
      while (n > 0) {
        const rem = (n - 1) % 26;
        out = String.fromCharCode(65 + rem) + out;
        n = Math.floor((n - 1) / 26);
      }
      return out;
    }

    function parseRef(ref) {
      const m = ref.toUpperCase().match(/^([A-Z]+)(\d+)$/);
      if (!m) return null;
      return { col: colToNumber(m[1]), row: Number(m[2]) };
    }

    function parseRange(rng) {
      const m = rng.toUpperCase().match(/^([A-Z]+)(\d+):([A-Z]+)(\d+)$/);
      if (!m) return null;
      return {
        s: { col: colToNumber(m[1]), row: Number(m[2]) },
        e: { col: colToNumber(m[3]), row: Number(m[4]) },
      };
    }

    function buildMergedValueMap(ws, targetCol) {
      const mapping = new Map();
      const merges = ws.model && ws.model.merges ? ws.model.merges : [];
      for (const rng of merges) {
        const p = parseRange(rng);
        if (!p) continue;
        if (!(p.s.col <= targetCol && targetCol <= p.e.col)) continue;
        const topText = toText(ws.getCell(p.s.row, p.s.col).value);
        if (!topText) continue;
        for (let r = p.s.row; r <= p.e.row; r++) mapping.set(r, topText);
      }
      return mapping;
    }

    function normalizeLabel(v) {
      return toText(v).replace(/\s+/g, "");
    }

    function findNameHeader(ws) {
      const maxRow = Math.min(40, ws.rowCount || 1);
      const maxCol = Math.min(30, ws.columnCount || 1);
      for (let r = 1; r <= maxRow; r++) {
        for (let c = 1; c <= maxCol; c++) {
          if (normalizeLabel(ws.getCell(r, c).value) === "?깅챸") return { headerRow: r, nameCol: c };
        }
      }
      return null;
    }

    function resolveYearMonth(ws, headerRow, dayStartCol) {
      const firstFormula = getFormula(ws.getCell(headerRow, dayStartCol)).replace(/\s+/g, "");
      const m = firstFormula.match(/^DATE\(([^,]+),([^,]+),1\)$/i);
      if (m) {
        const parseToken = (token) => {
          const raw = token.replace(/\$/g, "");
          if (/^[A-Z]+\d+$/i.test(raw)) {
            const p = parseRef(raw);
            if (!p) return NaN;
            return Number(ws.getCell(p.row, p.col).value);
          }
          return Number(raw);
        };
        const y = Math.trunc(parseToken(m[1]));
        const mo = Math.trunc(parseToken(m[2]));
        if (Number.isFinite(y) && Number.isFinite(mo) && mo >= 1 && mo <= 12) return { year: y, month: mo };
      }

      let year = null;
      let month = null;
      for (let r = 1; r <= Math.min(8, ws.rowCount); r++) {
        for (let c = 1; c <= Math.min(12, ws.columnCount); c++) {
          const txt = toText(ws.getCell(r, c).value);
          if (txt === "??) {
            const left = Number(ws.getCell(r, c - 1).value);
            if (left >= 2000 && left <= 2100) year = Math.trunc(left);
          }
          if (txt === "??) {
            const left = Number(ws.getCell(r, c - 1).value);
            if (left >= 1 && left <= 12) month = Math.trunc(left);
          }
        }
      }
      if (year && month) return { year, month };
      throw new Error("?????뺣낫瑜?李얠? 紐삵뻽?듬땲??");
    }

    function findFirstDayCol(ws, headerRow, nameCol) {
      const maxCol = Math.min(ws.columnCount || 80, nameCol + 80);
      for (let c = nameCol + 1; c <= maxCol; c++) {
        const f = getFormula(ws.getCell(headerRow, c)).replace(/\s+/g, "").toUpperCase();
        if (f.startsWith("DATE(") && f.endsWith(",1)")) return c;
      }
      const weekdayRow = headerRow + 1;
      for (let c = nameCol + 1; c <= maxCol; c++) {
        if (getFormula(ws.getCell(weekdayRow, c)).toUpperCase().includes("WEEKDAY(")) return c;
      }
      return nameCol + 4;
    }

    function findScheduleSheet(workbook) {
      for (const ws of workbook.worksheets) {
        if (findNameHeader(ws)) return ws;
      }
      throw new Error("?깅챸 ?ㅻ뜑媛 ?덈뒗 ?쒗듃瑜?李얠? 紐삵뻽?듬땲??");
    }

    function extractEmployees(ws, headerRow, nameCol) {
      const teamCol = 2;
      const partCol = 3;
      const teamMap = buildMergedValueMap(ws, teamCol);
      const partMap = buildMergedValueMap(ws, partCol);
      const employees = [];
      let currentTeam = "";

      for (let row = headerRow + 2; row <= ws.rowCount; row++) {
        const teamCell = toText(ws.getCell(row, teamCol).value) || (teamMap.get(row) || "");
        if (teamCell) {
          currentTeam = teamCell.replace(/\n/g, " ").trim();
          if (SUMMARY_STOP_MARKERS.some((marker) => currentTeam.includes(marker))) break;
        }

        const name = toText(ws.getCell(row, nameCol).value);
        if (!name) continue;

        let part = toText(ws.getCell(row, partCol).value) || (partMap.get(row) || "");
        part = part ? part.replace(/\n/g, " ").trim() : "";
        if (!part) part = `PART_ROW_${row}`;
        const team = currentTeam || "誘몃텇瑜?;
        employees.push({ row, name, team, part: `${team}|${part}` });
      }

      if (!employees.length) throw new Error("吏곸썝 紐⑸줉???몄떇?섏? 紐삵뻽?듬땲??");
      return employees;
    }

    function loadContext(wb) {
      const ws = findScheduleSheet(wb);
      const header = findNameHeader(ws);
      if (!header) throw new Error("?깅챸 ?ㅻ뜑瑜?李얠? 紐삵뻽?듬땲??");
      const dayStartCol = findFirstDayCol(ws, header.headerRow, header.nameCol);
      const ym = resolveYearMonth(ws, header.headerRow, dayStartCol);
      const daysInMonth = new Date(ym.year, ym.month, 0).getDate();
      const dayEndCol = dayStartCol + daysInMonth - 1;
      const employees = extractEmployees(ws, header.headerRow, header.nameCol);
      return {
        wb,
        ws,
        headerRow: header.headerRow,
        nameCol: header.nameCol,
        year: ym.year,
        month: ym.month,
        dayStartCol,
        dayEndCol,
        daysInMonth,
        employees,
      };
    }

    function buildEmployeeRowMap(employees) {
      const m = new Map();
      for (const e of employees) {
        if (m.has(e.name)) throw new Error(`以묐났 吏곸썝紐? ${e.name}`);
        m.set(e.name, e.row);
      }
      return m;
    }

    function isUnavailable(value) {
      const t = toText(value);
      if (!t) return false;
      if (t === "?뱀쭅") return false;
      return OFF_MARKERS.has(t);
    }

    function isAvailable(ws, row, col) {
      return !isUnavailable(ws.getCell(row, col).value);
    }

    function hadTwoOffBefore(ws, row, dayCol, dayStartCol) {
      if (dayCol - 1 < dayStartCol) return false;
      const prev1 = toText(ws.getCell(row, dayCol - 1).value);
      const prev2 = dayCol - 2 >= dayStartCol ? toText(ws.getCell(row, dayCol - 2).value) : "";
      return prev1 === "?? && prev2 === "??;
    }

    function classifyDayType(year, month, day) {
      const weekday = new Date(year, month - 1, day).getDay();
      return (weekday === 5 || weekday === 6) ? "extended" : "normal";
    }

    function clearExistingDuty(ws, rows, dayStartCol, dayEndCol) {
      for (const row of rows) {
        for (let col = dayStartCol; col <= dayEndCol; col++) {
          if (toText(ws.getCell(row, col).value) === "?뱀쭅") ws.getCell(row, col).value = null;
        }
      }
    }

    function collectFixedAssignments(ctx) {
      const fixedAssignments = new Map();
      for (const emp of ctx.employees) {
        for (let col = ctx.dayStartCol; col <= ctx.dayEndCol; col++) {
          if (toText(ctx.ws.getCell(emp.row, col).value) !== "?뱀쭅") continue;
          const day = col - ctx.dayStartCol + 1;
          if (fixedAssignments.has(day) && fixedAssignments.get(day) !== emp.row) {
            throw new Error(`${day}??怨좎젙 ?뱀쭅????紐낆뿉寃?以묐났 ?낅젰?섏뿀?듬땲??`);
          }
          fixedAssignments.set(day, emp.row);
        }
      }
      return fixedAssignments;
    }

    function validateFixedAssignments(fixedAssignments, employees) {
      if (!fixedAssignments || fixedAssignments.size === 0) return;

      const byRow = new Map(employees.map((emp) => [emp.row, emp]));
      const byNameCount = new Map();
      let prevDay = null;
      let prevRow = null;

      for (const day of Array.from(fixedAssignments.keys()).sort((a, b) => a - b)) {
        const row = fixedAssignments.get(day);
        const emp = byRow.get(row);

        if (EXCLUDED_NAMES.has(emp.name)) {
          throw new Error(`${emp.name}?(?? ????쒖쇅 ??곸씤??${day}??怨좎젙 ?뱀쭅?쇰줈 ?낅젰?섏뿀?듬땲??`);
        }

        const nextCount = (byNameCount.get(emp.name) || 0) + 1;
        byNameCount.set(emp.name, nextCount);
        if (nextCount > 2) {
          throw new Error(`${emp.name}??怨좎젙 ?뱀쭅??3???댁긽?낅땲?? 怨좎젙 ?뱀쭅??理쒕? 2?뚭퉴吏留?媛?ν빀?덈떎.`);
        }

        if (prevDay !== null && day === prevDay + 1 && row === prevRow) {
          throw new Error(`${emp.name}??怨좎젙 ?뱀쭅???곗냽??${prevDay}?? ${day}??濡??낅젰?섏뿀?듬땲??`);
        }

        prevDay = day;
        prevRow = row;
      }
    }

    function restoreDutyFormulas(ctx) {
      const dutyCountCol = ctx.nameCol + 3;
      const dayStartLetter = colToLetters(ctx.dayStartCol);
      const dayEndLetter = colToLetters(ctx.dayEndCol);

      for (const emp of ctx.employees) {
        ctx.ws.getCell(emp.row, dutyCountCol).value = {
          formula: `COUNTIF(${dayStartLetter}${emp.row}:${dayEndLetter}${emp.row},"?뱀쭅")`,
        };
      }

      const firstRow = Math.min(...ctx.employees.map((e) => e.row));
      const lastRow = Math.max(...ctx.employees.map((e) => e.row));
      const ajCol = colToNumber("AJ");
      ctx.ws.getCell(2, ajCol).value = {
        formula: `COUNTIF(${dayStartLetter}${firstRow}:${dayEndLetter}${lastRow},"?뱀쭅")`,
      };
    }

    function assignDuty(ctx, fixedAssignments) {
      const ws = ctx.ws;
      const eligible = ctx.employees.filter((e) => !EXCLUDED_NAMES.has(e.name));
      if (!eligible.length) throw new Error("?뱀쭅 諛곗젙 媛?ν븳 吏곸썝???놁뒿?덈떎.");

      const employeeCount = eligible.length;
      if (ctx.daysInMonth < employeeCount) {
        throw new Error(`諛곗젙 遺덇?: ?뱀쭅??${ctx.daysInMonth}) < ????쒖쇅 ?몄썝(${employeeCount})`);
      }
      if (ctx.daysInMonth > employeeCount * 2) {
        throw new Error(`諛곗젙 遺덇?: ?뱀쭅??${ctx.daysInMonth}) > 理쒕? ?덉슜(${employeeCount * 2})`);
      }

      const partMembers = new Map();
      const byRow = new Map();
      for (const emp of eligible) {
        byRow.set(emp.row, emp);
        if (!partMembers.has(emp.part)) partMembers.set(emp.part, []);
        partMembers.get(emp.part).push(emp.row);
      }

      const assignedTotal = new Map();
      const dayTypeCount = new Map();
      for (const emp of eligible) {
        assignedTotal.set(emp.row, 0);
        dayTypeCount.set(emp.row, { normal: 0, extended: 0 });
      }

      const assignments = new Map(fixedAssignments || []);
      const partUnsafeDays = [];
      let prevAssigned = null;

      if (fixedAssignments && fixedAssignments.size > 0) {
        validateFixedAssignments(fixedAssignments, eligible);
        for (const [day, row] of fixedAssignments.entries()) {
          const fixedDayType = classifyDayType(ctx.year, ctx.month, day);
          assignedTotal.set(row, assignedTotal.get(row) + 1);
          dayTypeCount.get(row)[fixedDayType] += 1;
        }
        if (fixedAssignments.has(1)) prevAssigned = fixedAssignments.get(1);
      }

      for (let day = 1; day <= ctx.daysInMonth; day++) {
        if (assignments.has(day)) {
          prevAssigned = assignments.get(day);
          continue;
        }
        const col = ctx.dayStartCol + day - 1;
        const dayType = classifyDayType(ctx.year, ctx.month, day);

        let candidates = eligible
          .map((e) => e.row)
          .filter((row) => isAvailable(ws, row, col))
          .filter((row) => assignedTotal.get(row) < 2)
          .filter((row) => row !== prevAssigned);

        if (!candidates.length) {
          throw new Error(`${day}??諛곗젙 遺덇?: ?곗냽湲덉?/2?뚰븳??議곌굔 異⑸룎`);
        }

        const safeRows = [];
        for (const row of candidates) {
          const part = byRow.get(row).part;
          const members = partMembers.get(part);
          if (!members || members.length < 2) {
            safeRows.push(row);
            continue;
          }
          const openableAfter = members.filter((r) => r !== row && isAvailable(ws, r, col)).length;
          if (openableAfter >= 1) safeRows.push(row);
        }

        const keepFeasible = (rows) => {
          const remain = ctx.daysInMonth - day;
          const zeroCount = Array.from(assignedTotal.values()).filter((x) => x === 0).length;
          return rows.filter((row) => {
            const zeroAfter = zeroCount - (assignedTotal.get(row) === 0 ? 1 : 0);
            return zeroAfter <= remain;
          });
        };

        let prioritized = safeRows.length ? safeRows : candidates;
        let feasible = keepFeasible(prioritized);
        if (!feasible.length && safeRows.length) {
          feasible = keepFeasible(candidates);
          if (feasible.length) partUnsafeDays.push(day);
        } else if (!safeRows.length) {
          partUnsafeDays.push(day);
        }
        if (!feasible.length) throw new Error(`${day}??諛곗젙 遺덇?: ?꾨낫 ?놁쓬`);

        const scored = feasible.map((row) => {
          const firstAssign = assignedTotal.get(row) === 0 ? 0 : 1;
          const offFollowing = hadTwoOffBefore(ws, row, col, ctx.dayStartCol) ? 0 : 1;
          const total = assignedTotal.get(row);
          const dayTypeUsed = dayTypeCount.get(row)[dayType];
          return { row, key: [firstAssign, offFollowing, total, dayTypeUsed, Math.random()] };
        });
        scored.sort((a, b) => {
          for (let i = 0; i < a.key.length; i++) {
            if (a.key[i] < b.key[i]) return -1;
            if (a.key[i] > b.key[i]) return 1;
          }
          return 0;
        });

        const chosen = scored[0].row;
        assignments.set(day, chosen);
        assignedTotal.set(chosen, assignedTotal.get(chosen) + 1);
        dayTypeCount.get(chosen)[dayType] += 1;
        prevAssigned = chosen;
      }

      for (const emp of eligible) {
        const cnt = assignedTotal.get(emp.row);
        if (cnt < 1 || cnt > 2) throw new Error(`?잛닔 ?쒖빟 ?꾨컲: ${emp.name}=${cnt}`);
      }

      for (const [day, row] of assignments.entries()) {
        const col = ctx.dayStartCol + day - 1;
        ws.getCell(row, col).value = "?뱀쭅";
      }

      return { assignments, assignedTotal, dayTypeCount, partUnsafeDays, eligible };
    }

    async function loadWorkbook(file) {
      const wb = new ExcelJS.Workbook();
      const data = await file.arrayBuffer();
      await wb.xlsx.load(data);
      return wb;
    }

    async function mergeTeamFiles(files) {
      if (files.length !== 3) throw new Error("?뚯씪? ?뺥솗??3媛??낅줈?쒗빐???⑸땲??");
      const contexts = [];
      for (const file of files) {
        const wb = await loadWorkbook(file);
        contexts.push(loadContext(wb));
      }

      const base = contexts.slice().sort((a, b) => b.employees.length - a.employees.length)[0];
      const baseNameToRow = buildEmployeeRowMap(base.employees);
      const mergedValues = new Map();
      const valueSource = new Map();

      for (const source of contexts) {
        if (source.year !== base.year || source.month !== base.month || source.daysInMonth !== base.daysInMonth) {
          throw new Error("???뺣낫媛 ?ㅻⅨ ?뚯씪???욎뿬 ?덉뒿?덈떎.");
        }
        const sourceNameToRow = buildEmployeeRowMap(source.employees);
        for (const [name, sourceRow] of sourceNameToRow.entries()) {
          if (!baseNameToRow.has(name)) continue;
          for (let day = 1; day <= base.daysInMonth; day++) {
            const value = source.ws.getCell(sourceRow, source.dayStartCol + day - 1).value;
            if (toText(value) === "") continue;
            const key = `${name}::${day}`;
            if (!mergedValues.has(key)) {
              mergedValues.set(key, value);
              valueSource.set(key, source);
              continue;
            }
            const current = toText(mergedValues.get(key));
            const incoming = toText(value);
            if (current !== incoming) {
              throw new Error(`媛?異⑸룎: ${name} ${day}??(${current} vs ${incoming})`);
            }
          }
        }
      }

      for (const emp of base.employees) {
        for (let day = 1; day <= base.daysInMonth; day++) {
          base.ws.getCell(emp.row, base.dayStartCol + day - 1).value = null;
        }
      }

      for (const [key, value] of mergedValues.entries()) {
        const [name, dayStr] = key.split("::");
        const day = Number(dayStr);
        base.ws.getCell(baseNameToRow.get(name), base.dayStartCol + day - 1).value = value;
      }

      return base;
    }

    function summaryText(ctx, result) {
      const lines = [];
      lines.push(`珥?${ctx.daysInMonth}??諛곗젙 ?꾨즺`);
      for (const emp of result.eligible) {
        const total = result.assignedTotal.get(emp.row);
        const normal = result.dayTypeCount.get(emp.row).normal;
        const extended = result.dayTypeCount.get(emp.row).extended;
        lines.push(`- ${emp.name}: 珥?${total}??(?뺤긽 ${normal} / ?곗옣 ${extended})`);
      }
      if (result.partUnsafeDays.length) {
        lines.push(`?뚰듃 ?ㅽ뵂 ?덉쇅?? ${result.partUnsafeDays.join(", ")}`);
      }
      return lines.join("\n");
    }

    function stamp() {
      const d = new Date();
      const p = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}${p(d.getMonth() + 1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
    }

    filesInput.addEventListener("change", () => {
      const files = Array.from(filesInput.files || []);
      if (!files.length) {
        filesInfo.textContent = "?좏깮???뚯씪 ?놁쓬";
        return;
      }
      filesInfo.textContent = files.map((f, i) => `${i + 1}. ${f.name}`).join("\n");
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (downloadUrl) {
        URL.revokeObjectURL(downloadUrl);
        downloadUrl = null;
      }
      downloadBtn.classList.add("hidden");

      try {
        const files = Array.from(filesInput.files || []);
        if (files.length !== 3) throw new Error("?뚯씪???뺥솗??3媛??좏깮?섏꽭??");

        runBtn.disabled = true;
        setStatus("?뚯씪 遺꾩꽍 諛?痍⑦빀 以?..");

        const ctx = await mergeTeamFiles(files);
        const fixedAssignments = collectFixedAssignments(ctx);
        const eligibleRows = ctx.employees.filter((e) => !EXCLUDED_NAMES.has(e.name)).map((e) => e.row);
        clearExistingDuty(ctx.ws, eligibleRows, ctx.dayStartCol, ctx.dayEndCol);

        const result = assignDuty(ctx, fixedAssignments);
        restoreDutyFormulas(ctx);

        const outBuffer = await ctx.wb.xlsx.writeBuffer();
        outputBlob = new Blob(
          [outBuffer],
          { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" },
        );
        outputName = `?뱀쭅?뺤젙蹂??먮룞?앹꽦_${stamp()}.xlsx`;
        downloadUrl = URL.createObjectURL(outputBlob);
        downloadBtn.href = downloadUrl;
        downloadBtn.download = outputName;
        downloadBtn.classList.remove("hidden");

        setStatus(summaryText(ctx, result), "ok");
      } catch (err) {
        setStatus(`?앹꽦 ?ㅽ뙣: ${err && err.message ? err.message : String(err)}`, "error");
      } finally {
        runBtn.disabled = false;
      }
    });

    downloadBtn.addEventListener("click", async (e) => {
      if (!outputBlob) return;
      if ("showSaveFilePicker" in window) {
        e.preventDefault();
        try {
          const handle = await window.showSaveFilePicker({
            suggestedName: outputName || `automatic_dangjik_${stamp()}.xlsx`,
            types: [{
              description: "Excel Workbook",
              accept: { "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet": [".xlsx"] },
            }],
          });
          const writable = await handle.createWritable();
          await writable.write(outputBlob);
          await writable.close();
          setStatus("?ㅼ슫濡쒕뱶 ?꾨즺", "ok");
          return;
        } catch (_) {
          // fallback to normal anchor download
        }
      }
      setStatus("?ㅼ슫濡쒕뱶 ?꾨즺", "ok");
    });
  </script>
